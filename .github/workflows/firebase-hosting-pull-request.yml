name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: './web_app/package-lock.json'

      - name: Create env file
        working-directory: ./web_app
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ASSET_MASTER_JWPARK }}
        run: |
          echo "NEXT_PUBLIC_ALLOWED_EMAILS=${{ secrets.NEXT_PUBLIC_ALLOWED_EMAILS }}" > .env.production
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            node -e "const fs=require('fs'); const j=process.env.FIREBASE_SERVICE_ACCOUNT_JSON; fs.appendFileSync('.env.production', 'FIREBASE_SERVICE_ACCOUNT_JSON=' + JSON.stringify(j) + String.fromCharCode(10));"
          fi

      - name: Install dependencies and build
        working-directory: ./web_app
        run: |
          npm ci
          npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ASSET_MASTER_JWPARK }}
          projectId: asset-master-jwpark
          entryPoint: ./web_app
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ASSET_MASTER_JWPARK }}
